<ui:prop name="multiple" type="boolean" optional="{true}" client="{true}" default="{false}" description="Whether multiple accordion items can be expanded at the same time." />
<ui:prop name="collapsible" type="boolean" optional="{true}" client="{true}" default="{true}" description="Whether an accordion item can be closed after it has been expanded." />
<ui:prop name="defaultValue" type="string[]" optional="{true}" client="{true}" description="The initial value of the expanded accordion items. Use when you don't need to control the value of the accordion." />
<ui:prop name="disabled" type="boolean" optional="{true}" client="{true}" description="Whether the accordion items are disabled." />
<ui:prop name="orientation" type="Jramke\FluidPrimitives\Enum\Orientation" optional="{true}" client="{true}" default="{f:constant(name: 'Jramke\FluidPrimitives\Enum\Orientation::Vertical')}" description="The orientation of the accordion items." />

<f:variable name="refData" value="{orientation: orientation}" />

<div
    {f:if(condition: class, then: 'class="{class}"' )}
    {f:if(condition: context.ids.root, then: 'id="{context.ids.root}"' )}
    {ui:ref(name: 'root' , data: refData )}
    {ui:attributes()}>
    <f:slot />
</div>
