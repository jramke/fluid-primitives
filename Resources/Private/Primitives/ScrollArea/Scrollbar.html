<ui:prop name="orientation" type="Jramke\FluidPrimitives\Enum\Orientation" default="{f:constant(name: 'Jramke\FluidPrimitives\Enum\Orientation::Vertical')}" context="{true}" description="The orientation of the scrollbar." />

<div
    {f:if(condition: class, then: 'class="{class}"' )}
    {f:if(condition: context.ids.scrollbar, then: 'id="{context.ids.scrollbar}"' )}
    {ui:ref(name: 'scrollbar' , data: {orientation: orientation} )}
    style="{context.scrollbarStyles}"
    {ui:attributes()}>
    <f:slot />
</div>
