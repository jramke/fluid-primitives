<ui:prop name="state" type="Jramke\FluidPrimitives\Enum\CollapsibleIndicatorState" optional="{true}" requiredAtRuntime="{true}" description="The indicator state to render." />

<f:variable name="refData" value="{variant: state}" />
<f:variable name="isHidden" value="{context -> ui:call(method: 'isIndicatorHidden', arguments: {0: state})}" />

<span
    {f:if(condition: isHidden, then: 'hidden' )}
    {f:if(condition: class, then: 'class="{class}"' )}
    {ui:ref(name: 'indicator-{state.value}' , data: refData )}
    {ui:attributes()}>
    <f:slot />
</span>
