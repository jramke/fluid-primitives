<ui:prop name="value" type="string" optional="{true}" context="{true}" requiredAtRuntime="{true}" description="The value of the radio item." />
<ui:prop name="disabled" type="boolean" optional="{true}" context="{true}" description="Whether the radio item is disabled." />
<ui:prop name="invalid" type="boolean" optional="{true}" context="{true}" description="Whether the radio item is invalid." />

<f:variable name="itemProps" value="{value: value, disabled: disabled, invalid: invalid}" />
<f:variable name="itemDataAttributes">{context -> ui:call(method: 'getItemDataAttributes', arguments: {0: itemProps})}</f:variable>

<label
    {f:if(condition: class, then: 'class="{class}"' )}
    {f:if(condition: context.ids.item, then: 'id="{context.ids.item}"' )}
    {ui:ref(name: 'item' , data: itemDataAttributes )}
    {ui:attributes()}>
    <f:slot />
</label>
