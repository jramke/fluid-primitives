<ui:prop name="defaultValue" type="string" optional="{true}" client="{true}" description="The initial value of the checked radio when rendered. Use when you don't need to control the value of the radio group. Inherited from a surrounding field when available." />
<ui:prop name="name" type="string" optional="{true}" client="{true}" description="The name of the input fields in the radio. Useful for form submission. Inherited from a surrounding field when available." />
<ui:prop name="form" type="string" optional="{true}" client="{true}" description="The associate form of the underlying input." />
<ui:prop name="disabled" type="boolean" optional="{true}" client="{true}" description="If `true`, the radio group will be disabled. Inherited from a surrounding field when available." />
<ui:prop name="readOnly" type="boolean" optional="{true}" client="{true}" description="Whether the radio group is read-only. Inherited from a surrounding field when available." />
<ui:prop name="required" type="boolean" optional="{true}" client="{true}" description="If `true`, the radio group is marked as required. Inherited from a surrounding field when available." />
<ui:prop name="orientation" type="Jramke\FluidPrimitives\Enum\Orientation" optional="{true}" client="{true}" default="{f:constant(name: 'Jramke\FluidPrimitives\Enum\Orientation::Vertical')}" description="Orientation of the radio group." />
<ui:prop name="invalid" type="boolean" optional="{true}" client="{true}" description="If `true`, the radio group is marked as invalid. Inherited from a surrounding field when available." />

<f:variable name="refData" value="{orientation: orientation, disabled: disabled, readonly: readOnly, required: required, invalid: invalid}" />

<div
    role="radiogroup"
    aria-required="{f:if(condition: required, then: 'true', else: 'false')}"
    aria-disabled="{f:if(condition: disabled, then: 'true', else: 'false')}"
    aria-readonly="{f:if(condition: readOnly, then: 'true', else: 'false')}"
    {f:if(condition: class, then: 'class="{class}"' )}
    {f:if(condition: context.ids.root, then: 'id="{context.ids.root}"' )}
    {ui:ref(name: 'root' , data: refData )}
    {ui:attributes()}
    style="position: relative;">
    <f:slot />
</div>
