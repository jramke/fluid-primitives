<ui:error when="!{context.item.value}" message="The {component.fullName} must only be used inside a navigationMenu.item component" />
<f:variable name="value" value="{context.item.value}" />

<f:variable name="itemState">{context -> ui:call(method: 'getItemState', arguments: {0: context.item})}</f:variable>

<f:variable name="state" value="{itemState.state}" />
<f:variable name="refData" value="{value: value, disabled: itemState.disabled, state: state}" />

<button
    data-uid="{context.rootId}"
    type="button"
    aria-expanded="{f:if(condition: itemState.open, then: 'true', else: 'false')}"
    aria-haspopup="menu"
    {f:if(condition: itemState.disabled, then: 'disabled' )}
    {f:if(condition: class, then: 'class="{class}"' )}
    {ui:ref(name: 'trigger' , data: refData)}
    {ui:attributes()}>
    <f:slot />
</button>
