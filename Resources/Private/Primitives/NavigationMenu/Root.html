<ui:prop name="orientation" type="Jramke\FluidPrimitives\Enum\Orientation" optional="{true}" client="{true}" default="{f:constant(name: 'Jramke\FluidPrimitives\Enum\Orientation::Horizontal')}" description="The orientation of the navigation menu." />
<ui:prop name="defaultValue" type="string" optional="{true}" client="{true}" default="" description="The default value of the navigation menu. Use when you don't want to control the value of the menu." />
<ui:prop name="openDelay" type="integer" optional="{true}" client="{true}" default="200" description="The delay before the menu opens." />
<ui:prop name="closeDelay" type="integer" optional="{true}" client="{true}" default="300" description="The delay before the menu closes." />
<ui:prop name="disableHoverTrigger" type="boolean" optional="{true}" client="{true}" description="Whether to disable the hover trigger." />
<ui:prop name="disableClickTrigger" type="boolean" optional="{true}" client="{true}" description="Whether to disable the click trigger." />
<ui:prop name="disablePointerLeaveClose" type="boolean" optional="{true}" client="{true}" description="Whether to disable the pointer leave close." />

<f:variable name="refData" value="{orientation: orientation}" />

<nav
    {f:if(condition: class, then: 'class="{class}"' )}
    {f:if(condition: context.ids.root, then: 'id="{context.ids.root}"' )}
    {ui:ref(name: 'root' , data: refData)}
    {ui:attributes()}>
    <f:slot />
</nav>
