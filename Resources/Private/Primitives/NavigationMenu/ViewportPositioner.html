<ui:prop name="align" type="Jramke\FluidPrimitives\Enum\NavigationMenuAlign" optional="{true}" default="{f:constant(name: 'Jramke\FluidPrimitives\Enum\NavigationMenuAlign::Center')}" context="{true}" description="Placement of the viewport for CSS variables `--viewport-x` and `--viewport-y`." />

<f:variable name="refData" value="{orientation: context.orientation, align: align}" />

<div
    {f:if(condition: class, then: 'class="{class}"' )}
    {ui:ref(name: 'viewport-positioner' , data: refData)}
    {ui:attributes()}>
    <f:slot />
</div>
