<ui:error when="!{context.item} || !{context.item.item}" message="The {component.fullName} must only be used within a `select.item` element." />

<f:variable name="item" value="{context.item.item}" />
<f:variable name="itemState">{context -> ui:call(method: 'getItemState', arguments: {0: item})}</f:variable>
<f:variable name="refData" value="{value: item.value, disabled: itemState.disabled, selected: itemState.selected}" />

<div
    {f:if(condition: itemState.selected, else: 'hidden="true"')}
    aria-hidden="true"
    {f:if(condition: class, then: 'class="{class}"' )}
    {f:if(condition: context.ids.item-indicator, then: 'id="{context.ids.item-indicator}"' )}
    {ui:ref(name: 'item-indicator' , data: refData )}
    {ui:attributes()}>
    <f:slot />
</div>
