<ui:prop name="item" type="mixed" optional="{true}" context="{true}" requiredAtRuntime="{true}" description="The item to render." />

<f:variable name="itemState">{context -> ui:call(method: 'getItemState', arguments: {0: item})}</f:variable>
<f:variable name="refData" value="{item: item, value: item.value, disabled: itemState.disabled, selected: itemState.selected}" />

<div
    role="option"
    {f:if(condition: itemState.selected, then: 'aria-selected="true"')}
    {f:if(condition: itemState.disabled, then: 'aria-disabled="true"')}
    {f:if(condition: class, then: 'class="{class}"' )}
    {f:if(condition: context.ids.item, then: 'id="{context.ids.item}"' )}
    {ui:ref(name: 'item' , data: refData )}
    {ui:attributes()}>
    <f:slot />
</div>
