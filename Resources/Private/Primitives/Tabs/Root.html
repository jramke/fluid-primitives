<ui:prop name="loopFocus" type="boolean" optional="{true}" client="{true}" default="{true}" description="Whether the keyboard navigation will loop from last tab to first, and vice versa." />
<ui:prop name="defaultValue" type="string" optional="{true}" client="{true}" description="The initial selected tab value when rendered. Use when you don't need to control the selected tab value." />
<ui:prop name="orientation" type="Jramke\FluidPrimitives\Enum\Orientation" optional="{true}" client="{true}" default="{f:constant(name: 'Jramke\FluidPrimitives\Enum\Orientation::Horizontal')}" description="The orientation of the tabs." />
<ui:prop name="activationMode" type="Jramke\FluidPrimitives\Enum\TabsActivationMode" optional="{true}" client="{true}" default="{f:constant(name: 'Jramke\FluidPrimitives\Enum\TabsActivationMode::Automatic')}" description="The activation mode of the tabs." />
<ui:prop name="composite" type="boolean" optional="{true}" client="{true}" default="{true}" description="Whether the tab is composite." />
<ui:prop name="deselectable" type="boolean" optional="{true}" client="{true}" description="Whether the active tab can be deselected when clicking on it." />

<f:variable name="refData" value="{orientation: orientation}" />

<div
    {f:if(condition: class, then: 'class="{class}"' )}
    {f:if(condition: context.ids.root, then: 'id="{context.ids.root}"' )}
    {ui:ref(name: 'root' , data: refData )}
    {ui:attributes()}>
    <f:slot />
</div>
