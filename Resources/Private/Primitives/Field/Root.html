<ui:prop name="name" type="string" optional="{true}" client="{true}" requiredAtRuntime="{true}" description="The unique field name used to associate labels, descriptions, errors, and form values." />
<ui:prop name="disabled" type="boolean" optional="{true}" client="{true}" description="Whether the field is disabled." />
<ui:prop name="invalid" type="boolean" optional="{true}" client="{true}" description="Whether the field is invalid." />
<ui:prop name="required" type="boolean" optional="{true}" client="{true}" description="Whether the field is required." />
<ui:prop name="readOnly" type="boolean" optional="{true}" client="{true}" description="Whether the field is read-only." />
<ui:prop name="defaultValue" type="mixed" optional="{true}" client="{true}" description="The initial value that child controls can use when rendered inside the field." />
<ui:prop name="validators" type="mixed" optional="{true}" client="{true}" description="Per-field TanStack Form validators (onChange, onBlur, onSubmit and async counterparts). Usually provided client-side." />

<div
    {f:if(condition: class, then: 'class="{class}"' )}
    {f:if(condition: context.ids.root, then: 'id="{context.ids.root}"' )}
    {ui:ref(name: 'root' )}
    {ui:attributes()}>
    <f:slot />
</div>
