<ui:prop name="state" type="Jramke\FluidPrimitives\Enum\ClipboardIndicatorState" optional="{true}" requiredAtRuntime="{true}" description="The indicator state to render." />

<span
    {f:if(condition: '{state.value}==copied' , then: 'hidden' )}
    {f:if(condition: class, then: 'class="{class}"' )}
    {ui:ref(name: 'indicator-{state.value}' )}
    {ui:attributes()}>
    <f:slot />
</span>
