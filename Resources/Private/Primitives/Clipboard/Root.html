<ui:prop name="value" type="string" client="{true}" optional="{true}" requiredAtRuntime="{true}" description="The value to copy to the clipboard." />
<ui:prop name="timeout" type="integer" optional="{true}" client="{true}" default="3000" description="The timeout for the copied state in milliseconds." />

<div
    {f:if(condition: class, then: 'class="{class}"' )}
    {f:if(condition: context.ids.root, then: 'id="{context.ids.root}"' )}
    {ui:ref(name: 'root' )}
    {ui:attributes()}>
    <f:slot />
</div>
