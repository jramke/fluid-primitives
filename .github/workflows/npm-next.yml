name: Publish next snapshot to npm

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: npm-next
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Set unique next snapshot version
        run: |
          VERSION=$(node -e 'const fs = require("node:fs"); const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")); process.stdout.write(`${pkg.version}-next.${process.env.GITHUB_RUN_NUMBER}.${process.env.GITHUB_SHA.slice(0, 7)}`)')
          npm version "$VERSION" --no-git-tag-version

      - run: npm ci
      - run: npm run build
      - run: npm publish --tag next
