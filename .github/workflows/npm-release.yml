name: Publish to npm

on:
  push:
    branches:
      - main
    tags:
      - '**'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build --if-present

      - name: Set unique next snapshot version
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION=$(node -e 'const fs = require("node:fs"); const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")); process.stdout.write(`${pkg.version}-next.${process.env.GITHUB_RUN_NUMBER}.${process.env.GITHUB_SHA.slice(0, 7)}`)')
          npm pkg set version="$VERSION"

      - name: Publish next snapshot
        if: github.ref == 'refs/heads/main'
        run: npm publish --tag next

      - name: Publish stable release
        if: startsWith(github.ref, 'refs/tags/')
        run: npm publish
